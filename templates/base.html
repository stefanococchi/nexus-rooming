<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus Rooming{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <a href="{{ url_for('rooming.index') }}" class="nav-home">
            <span class="nav-logo">⬡</span>
            <span class="nav-title">Nexus Rooming</span>
        </a>
    </div>
    <div class="nav-right">
        <a href="{{ url_for('rooming.activities_page') }}" style="font-size:13px;color:var(--text-muted);text-decoration:none;margin-right:16px">📅 Attività</a>
        <a href="{{ url_for('logout') }}" class="btn-logout">Esci</a>
    </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<footer class="footer">
    <span>Nexus Rooming</span>
    <span class="version">{{ app_version }}</span>
</footer>

</body>
</html>
